# Exp A — exp2 workaround: NCCL_CUMEM_ENABLE + host network + shared /dev/shm
# Known-working config from exp2 for comparison.
# Uses three workarounds the shim aims to replace:
#   1. NCCL_CUMEM_ENABLE=1 (NCCL env var)
#   2. network_mode: host (shared network NS for abstract UDS)
#   3. shared-shm volume (matching st_dev across containers)
#
# Per-GPU compute isolation via CUDA_VISIBLE_DEVICES.
# NVIDIA_VISIBLE_DEVICES=all for NVML topology discovery.

services:
  rank0:
    image: tth37/xtrans-experiments:expa-benchmark
    container_name: expa-exp2-rank0
    runtime: nvidia
    network_mode: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - NCCL_CUMEM_ENABLE=1
      - NCCL_DEBUG=INFO
      - NCCL_DEBUG_SUBSYS=INIT,P2P,SHM,NET
      - WORLD_SIZE=2
      - RANK=0
      - MASTER_ADDR=127.0.0.1
      - MASTER_PORT=29500
      - OUTPUT_FILE=/results/exp2.json
      - DEPLOYMENT=exp2
      - SMOKE_TEST=${SMOKE_TEST:-false}
    volumes:
      - ./benchmark.py:/workspace/benchmark.py
      - ./benchmark_docker.py:/workspace/benchmark_docker.py
      - ./results:/results
      - shared-shm:/dev/shm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]

  rank1:
    image: tth37/xtrans-experiments:expa-benchmark
    container_name: expa-exp2-rank1
    runtime: nvidia
    network_mode: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=1
      - NCCL_CUMEM_ENABLE=1
      - NCCL_DEBUG=INFO
      - NCCL_DEBUG_SUBSYS=INIT,P2P,SHM,NET
      - WORLD_SIZE=2
      - RANK=1
      - MASTER_ADDR=127.0.0.1
      - MASTER_PORT=29500
      - DEPLOYMENT=exp2
      - SMOKE_TEST=${SMOKE_TEST:-false}
    volumes:
      - ./benchmark.py:/workspace/benchmark.py
      - ./benchmark_docker.py:/workspace/benchmark_docker.py
      - shared-shm:/dev/shm
    depends_on:
      - rank0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]

volumes:
  shared-shm:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=4g
