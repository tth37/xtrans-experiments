# Phase 2: Multi-GPU Container (Production Approach)
#
# Single container with all 4 GPUs. Tests whether Oobleck's fault tolerance
# provides its intended benefit inside a monolithic container.
#
# Usage:
#   docker compose -f compose.phase2.yml up -d
#   docker exec -it exp-a2-multi bash
#   # ... run training, simulate GPU failure, observe recovery
#   docker compose -f compose.phase2.yml down

services:
  multi:
    container_name: exp-a2-multi
    image: xtrans-exp-a2:latest
    build:
      context: .
      dockerfile: Dockerfile
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NCCL_DEBUG=INFO
    shm_size: "8g"
    volumes:
      - ..:/workspace/xtrans:ro
      - ./results:/workspace/results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Health check — observe whether K8s would consider this pod healthy
    # after an internal GPU failure. Adjust check command as needed.
    healthcheck:
      test: ["CMD-SHELL", "nvidia-smi > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command: sleep infinity
